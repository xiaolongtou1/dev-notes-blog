name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
            
            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                node-version: 20
                cache: npm
            
            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

            - name: Build project
              run: npm run build

